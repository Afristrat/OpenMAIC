services:
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.0
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - loki-data:/loki
    restart: unless-stopped

  glitchtip:
    image: glitchtip/glitchtip:latest
    depends_on: [glitchtip-db, redis]
    environment:
      DATABASE_URL: postgres://glitchtip:glitchtip@glitchtip-db:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-in-production}
      PORT: "8080"
      GLITCHTIP_MAX_EVENT_LIFE_DAYS: 90
      REDIS_URL: redis://redis:6379/1
    ports:
      - "${GLITCHTIP_PORT:-8080}:8080"
    restart: unless-stopped

  glitchtip-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: glitchtip
    volumes:
      - glitchtip-db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  glitchtip-db-data:
